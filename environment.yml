name: dc-satmvs
dependencies:
  - python=3.10
  - pip
  # PyTorch (CUDA 11.8)
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=11.8

  # Geospatial
  - gdal=3.4.1

  # Numeric / scientific
  - numpy=1.26.4
  - scipy=1.15.3
  - matplotlib=3.10.7

  - pip:
      # Deep learning / logging
      - tensorboard==2.20.0
      - tensorboardX==2.6.4
      - einops>=0.6.0

      # Image processing
      - opencv-python==4.10.0.84
      - Pillow>=9.3.0
      - imageio==2.37.2

      # Data processing
      - numpy_groupies

      # GPU acceleration
      - cupy-cuda11x==13.6.0

      # Point cloud
      - plyfile==1.1.3
      - pylas==0.4.3

      # Utilities
      - pyyaml==6.0.3
      - tqdm==4.67.1
      - networkx==3.4.2
      - protobuf==6.33.0
      - requests==2.32.5
